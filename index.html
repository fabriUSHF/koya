<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KIRO - Chats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* App container */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* Header con pestañas de chats */
        .tabs-container {
            background: #0a0a0f;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15);
            flex-shrink: 0;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            padding: 8px 12px;
            gap: 8px;
            scrollbar-width: thin;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #1a1a24;
            border-radius: 24px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .tab.active {
            background: #00d4ff;
            border-color: #00d4ff;
        }

        .tab.active .tab-name {
            color: #0a0a0f;
        }

        .tab-name {
            font-size: 13px;
            font-weight: 500;
            color: #e1e4e8;
        }

        .tab-close {
            background: none;
            border: none;
            color: #8899bb;
            font-size: 16px;
            cursor: pointer;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .new-tab-btn {
            background: #00d4ff;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Panel de chat */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Mensajes */
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #00d4ff15;
            border: 1px solid #00d4ff30;
            color: #00d4ff;
        }

        .message.ai {
            align-self: flex-start;
            background: #1a1a24;
            color: #e1e4e8;
        }

        .message.image {
            align-self: flex-start;
            background: #1a1a24;
            padding: 8px;
            border-radius: 16px;
        }

        .message.image img {
            max-width: 160px;
            max-height: 160px;
            border-radius: 12px;
            cursor: pointer;
        }

        /* Input area con botones integrados */
        .input-wrapper {
            background: #111118;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 28px;
            background: #1a1a24;
            color: #e1e4e8;
            font-size: 15px;
            outline: none;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mic-action {
            background: #00d4ff;
            color: #0a0a0f;
        }

        .mic-action.listening {
            animation: pulse 1.5s infinite;
            background: #ff4444;
        }

        .speak-action {
            background: #1a1a24;
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }

        .send-action {
            background: #00d4ff;
            color: #0a0a0f;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Visualizador */
        .visualizer {
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3px;
            padding: 4px 16px;
            margin: 0 12px;
            background: rgba(0, 212, 255, 0.04);
            border-radius: 14px;
            flex-shrink: 0;
        }

        .bar {
            width: 3px;
            height: 6px;
            background: #00d4ff;
            border-radius: 2px;
            transition: height 0.05s ease;
        }

        /* Menú lateral */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #111118;
            border-right: 1px solid rgba(0, 212, 255, 0.2);
            z-index: 200;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: #00d4ff;
            font-size: 18px;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: #8899bb;
            font-size: 24px;
            cursor: pointer;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .chat-item {
            background: #1a1a24;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #222230;
        }

        .chat-item.active {
            border-left: 3px solid #00d4ff;
        }

        .chat-title {
            font-size: 14px;
            color: #e1e4e8;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 11px;
            color: #8899bb;
        }

        .chat-date {
            font-size: 9px;
            color: #00d4ff;
            margin-top: 6px;
        }

        .delete-chat {
            background: none;
            border: none;
            color: #ff4444;
            font-size: 16px;
            cursor: pointer;
            margin-top: 6px;
            text-align: right;
        }

        .menu-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a24;
            border: 1px solid #00d4ff;
            cursor: pointer;
            font-size: 20px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .image-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            cursor: pointer;
        }

        .image-preview img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        .chat-container::-webkit-scrollbar {
            width: 3px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: #1a1a24;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 3px;
        }

        .tabs::-webkit-scrollbar {
            height: 2px;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="tabs-container">
        <div class="tabs" id="tabsContainer">
            <!-- Pestañas dinámicas -->
        </div>
    </div>

    <div class="visualizer" id="visualizer"></div>

    <div class="chat-panel" id="chatPanel">
        <div class="chat-container" id="chatContainer">
            <!-- Mensajes del chat actual -->
        </div>

        <div class="input-wrapper">
            <button class="action-btn mic-action" id="micBtn">🎤</button>
            <input type="text" id="messageInput" placeholder="mensaje">
            <button class="action-btn send-action" id="sendBtn">→</button>
            <button class="action-btn speak-action" id="speakBtn">🔊</button>
        </div>
    </div>
</div>

<button class="menu-btn" id="menuBtn">☰</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>📜 CHATS</h3>
        <button class="close-sidebar" id="closeSidebar">×</button>
    </div>
    <div class="chats-list" id="chatsList">
        <!-- Lista de chats guardados -->
    </div>
</div>
<div class="overlay" id="overlay"></div>

<script>
    // ==================== CONFIGURACIÓN ====================
    let vozActiva = true;
    let escuchando = false;
    let reconocimiento = null;
    let esperandoRespuesta = false;
    let chatActualId = null;

    // Estructura de datos
    let chats = [];
    let nextId = 1;

    const STORAGE_KEY = "kiro_chats";

    // Elementos
    const tabsContainer = document.getElementById('tabsContainer');
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const micBtn = document.getElementById('micBtn');
    const sendBtn = document.getElementById('sendBtn');
    const speakBtn = document.getElementById('speakBtn');
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeSidebar = document.getElementById('closeSidebar');
    const chatsList = document.getElementById('chatsList');
    const visualizer = document.getElementById('visualizer');

    // Visualizador
    function crearVisualizador() {
        visualizer.innerHTML = '';
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }
    }
    crearVisualizador();
    const bars = document.querySelectorAll('.bar');

    let animando = false;
    function animarVisualizador(intensidad = 0.5) {
        if (animando) return;
        animando = true;
        function animar() {
            if (!animando) return;
            bars.forEach((bar, i) => {
                const angle = (i / bars.length) * Math.PI * 2;
                const height = 4 + (intensidad * 30) * (0.5 + 0.5 * Math.sin(angle + Date.now() / 120));
                bar.style.height = `${Math.max(4, Math.min(35, height))}px`;
            });
            requestAnimationFrame(animar);
        }
        animar();
    }

    function detenerVisualizador() {
        animando = false;
        bars.forEach(bar => bar.style.height = '6px');
    }

    // Voz
    function hablar(texto) {
        if (!vozActiva || !texto) return;
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        animarVisualizador(0.6);
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.onend = () => detenerVisualizador();
        utterance.onerror = () => detenerVisualizador();
        window.speechSynthesis.speak(utterance);
    }

    // ==================== GESTIÓN DE CHATS ====================
    function guardarChats() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
        renderizarTabs();
        renderizarListaChats();
    }

    function crearNuevoChat() {
        const nuevoChat = {
            id: nextId++,
            nombre: `Chat ${nextId - 1}`,
            fecha: new Date().toLocaleString(),
            mensajes: [],
            ultimoMensaje: ""
        };
        chats.unshift(nuevoChat);
        guardarChats();
        setChatActual(nuevoChat.id);
        return nuevoChat;
    }

    function setChatActual(id) {
        chatActualId = id;
        const chat = chats.find(c => c.id === id);
        if (chat) {
            renderizarMensajes(chat);
        }
        renderizarTabs();
        renderizarListaChats();
    }

    function eliminarChat(id) {
        if (chats.length === 1) {
            alert("No puedes eliminar el último chat. Crea uno nuevo primero.");
            return;
        }
        chats = chats.filter(c => c.id !== id);
        if (chatActualId === id) {
            setChatActual(chats[0].id);
        }
        guardarChats();
    }

    function agregarMensajeAlChat(chatId, texto, esUsuario, esImagen = false, imagenUrl = null) {
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        
        const mensaje = {
            id: Date.now(),
            texto: texto,
            esUsuario: esUsuario,
            timestamp: new Date().toLocaleTimeString(),
            esImagen: esImagen,
            imagenUrl: imagenUrl
        };
        
        chat.mensajes.push(mensaje);
        chat.ultimoMensaje = texto.substring(0, 50);
        chat.fecha = new Date().toLocaleString();
        
        guardarChats();
        
        if (chatId === chatActualId) {
            renderizarMensajes(chat);
        }
        
        return mensaje;
    }

    function renderizarMensajes(chat) {
        chatContainer.innerHTML = '';
        chat.mensajes.forEach(msg => {
            if (msg.esImagen && msg.imagenUrl) {
                const div = document.createElement('div');
                div.className = 'message image';
                div.innerHTML = `<img src="${msg.imagenUrl}" alt="${msg.texto}" onclick="verImagen(this.src)">`;
                chatContainer.appendChild(div);
            } else {
                const div = document.createElement('div');
                div.className = `message ${msg.esUsuario ? 'user' : 'ai'}`;
                div.textContent = msg.texto;
                chatContainer.appendChild(div);
            }
        });
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function renderizarTabs() {
        tabsContainer.innerHTML = '';
        chats.forEach(chat => {
            const tab = document.createElement('div');
            tab.className = `tab ${chatActualId === chat.id ? 'active' : ''}`;
            tab.innerHTML = `
                <span class="tab-name">${chat.nombre}</span>
                <button class="tab-close" data-id="${chat.id}">×</button>
            `;
            tab.onclick = (e) => {
                if (e.target.classList.contains('tab-close')) return;
                setChatActual(chat.id);
            };
            const closeBtn = tab.querySelector('.tab-close');
            closeBtn.onclick = (e) => {
                e.stopPropagation();
                eliminarChat(chat.id);
            };
            tabsContainer.appendChild(tab);
        });
        
        const newBtn = document.createElement('button');
        newBtn.className = 'new-tab-btn';
        newBtn.innerHTML = '+';
        newBtn.onclick = () => crearNuevoChat();
        tabsContainer.appendChild(newBtn);
    }

    function renderizarListaChats() {
        chatsList.innerHTML = '';
        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = `chat-item ${chatActualId === chat.id ? 'active' : ''}`;
            item.innerHTML = `
                <div class="chat-title">${chat.nombre}</div>
                <div class="chat-preview">${chat.ultimoMensaje || 'Nuevo chat'}</div>
                <div class="chat-date">${chat.fecha}</div>
                <button class="delete-chat" data-id="${chat.id}">🗑️ Eliminar</button>
            `;
            item.onclick = (e) => {
                if (e.target.classList.contains('delete-chat')) return;
                setChatActual(chat.id);
                cerrarMenu();
            };
            const deleteBtn = item.querySelector('.delete-chat');
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                eliminarChat(chat.id);
            };
            chatsList.appendChild(item);
        });
    }

    // ==================== IA Y PROCESAMIENTO ====================
    async function generarImagen(prompt) {
        let promptLimpio = prompt;
        const palabras = ["genera", "dibuja", "crea", "haz", "una imagen de", "un dibujo de", "imagen de", "dame"];
        for (const p of palabras) promptLimpio = promptLimpio.replace(p, "");
        promptLimpio = promptLimpio.trim();
        if (!promptLimpio) return { error: "¿Qué quieres que dibuje?" };
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptLimpio)}?width=512&height=512&nologo=true`;
        return { url, prompt: promptLimpio };
    }

    async function preguntarIA(mensaje) {
        try {
            const url = `https://text.pollinations.ai/${encodeURIComponent(mensaje)}`;
            const res = await fetch(url);
            if (res.ok) return await res.text();
            return null;
        } catch { return null; }
    }

    async function procesarMensaje(texto) {
        if (!texto.trim() || esperandoRespuesta) return;
        
        const lower = texto.toLowerCase();
        
        if (lower.includes('abre youtube')) {
            window.open('https://youtube.com', '_blank');
            agregarMensajeAlChat(chatActualId, "Abriendo YouTube", false);
            return;
        }
        if (lower.includes('abre google')) {
            window.open('https://google.com', '_blank');
            agregarMensajeAlChat(chatActualId, "Abriendo Google", false);
            return;
        }
        
        const palabrasImg = ["genera", "dibuja", "crea", "haz", "imagen de", "dibujo de"];
        if (palabrasImg.some(p => lower.includes(p))) {
            const img = await generarImagen(texto);
            if (img.error) {
                agregarMensajeAlChat(chatActualId, img.error, false);
            } else {
                agregarMensajeAlChat(chatActualId, img.prompt, false, true, img.url);
            }
            return;
        }
        
        esperandoRespuesta = true;
        
        const thinkingId = Date.now();
        const mensajePensando = {
            id: thinkingId,
            texto: "...",
            esUsuario: false,
            timestamp: new Date().toLocaleTimeString(),
            esImagen: false
        };
        const chat = chats.find(c => c.id === chatActualId);
        if (chat) {
            chat.mensajes.push(mensajePensando);
            renderizarMensajes(chat);
        }
        
        let respuesta = await preguntarIA(texto);
        if (!respuesta) respuesta = "No entendí. ¿Puedes repetir?";
        
        if (chat) {
            chat.mensajes = chat.mensajes.filter(m => m.id !== thinkingId);
            agregarMensajeAlChat(chatActualId, respuesta, false);
        }
        
        esperandoRespuesta = false;
    }

    async function enviarMensaje() {
        const texto = messageInput.value.trim();
        if (!texto) return;
        messageInput.value = '';
        agregarMensajeAlChat(chatActualId, texto, true);
        await procesarMensaje(texto);
    }

    // Reconocimiento de voz
    function iniciarReconocimiento() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) return;
        const rec = new SpeechRec();
        rec.lang = 'es-ES';
        rec.onstart = () => {
            escuchando = true;
            micBtn.classList.add('listening');
            micBtn.innerHTML = '🎙️';
            animarVisualizador(0.5);
        };
        rec.onresult = async (e) => {
            const texto = e.results[0][0].transcript;
            agregarMensajeAlChat(chatActualId, texto, true);
            await procesarMensaje(texto);
        };
        rec.onerror = () => {};
        rec.onend = () => {
            escuchando = false;
            micBtn.classList.remove('listening');
            micBtn.innerHTML = '🎤';
            detenerVisualizador();
        };
        rec.start();
    }

    function leerUltimoMensaje() {
        const chat = chats.find(c => c.id === chatActualId);
        if (chat && chat.mensajes.length > 0) {
            const ultimo = chat.mensajes.filter(m => !m.esUsuario && !m.esImagen).pop();
            if (ultimo && vozActiva) hablar(ultimo.texto);
        }
    }

    window.verImagen = (src) => {
        const overlayDiv = document.createElement('div');
        overlayDiv.className = 'image-preview';
        overlayDiv.onclick = () => overlayDiv.remove();
        const img = document.createElement('img');
        img.src = src;
        overlayDiv.appendChild(img);
        document.body.appendChild(overlayDiv);
    };

    // Menú lateral
    function abrirMenu() {
        sidebar.classList.add('open');
        overlay.classList.add('show');
        renderizarListaChats();
    }

    function cerrarMenu() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }

    // Eventos
    sendBtn.onclick = enviarMensaje;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') enviarMensaje(); };
    micBtn.onclick = () => { if (!escuchando) iniciarReconocimiento(); };
    speakBtn.onclick = leerUltimoMensaje;
    menuBtn.onclick = abrirMenu;
    closeSidebar.onclick = cerrarMenu;
    overlay.onclick = cerrarMenu;

    // Inicializar
    function init() {
        const guardado = localStorage.getItem(STORAGE_KEY);
        if (guardado) {
            chats = JSON.parse(guardado);
            nextId = Math.max(...chats.map(c => c.id), 0) + 1;
        }
        
        if (chats.length === 0) {
            const chatInicial = {
                id: nextId++,
                nombre: "Chat 1",
                fecha: new Date().toLocaleString(),
                mensajes: [],
                ultimoMensaje: ""
            };
            chats.push(chatInicial);
            guardarChats();
        }
        
        setChatActual(chats[0].id);
    }
    
    init();
</script>
</body>
</html>
