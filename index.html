<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KIRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Contenedor principal */
        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Panel principal */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #0a0a0f;
            transition: transform 0.3s ease;
        }

        /* Header compacto */
        .header {
            padding: 12px 16px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            flex-shrink: 0;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #00d4ff;
            letter-spacing: 2px;
        }

        /* Visualizador pequeño */
        .visualizer {
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3px;
            padding: 4px 16px;
            margin: 4px 12px;
            background: rgba(0, 212, 255, 0.04);
            border-radius: 16px;
            flex-shrink: 0;
        }

        .bar {
            width: 3px;
            height: 8px;
            background: #00d4ff;
            border-radius: 2px;
            transition: height 0.05s ease;
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 6px 16px;
            flex-shrink: 0;
        }

        .btn {
            padding: 5px 16px;
            border: none;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            background: #1a1a24;
            color: #8899bb;
        }

        .btn-active {
            background: #00d4ff;
            color: #0a0a0f;
        }

        /* Área de chat - más alto */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .message {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #00d4ff15;
            border: 1px solid #00d4ff30;
            color: #00d4ff;
        }

        .message.ai {
            align-self: flex-start;
            background: #1a1a24;
            color: #e1e4e8;
        }

        .message.image {
            align-self: flex-start;
            background: #1a1a24;
            padding: 6px;
            border-radius: 12px;
        }

        .message.image img {
            max-width: 140px;
            max-height: 140px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Input más arriba */
        .input-area {
            padding: 10px 16px 12px;
            background: #111118;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 24px;
            background: #1a1a24;
            color: #e1e4e8;
            font-size: 14px;
            outline: none;
        }

        /* Botones flotantes */
        .menu-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a24;
            border: 1px solid #00d4ff;
            cursor: pointer;
            font-size: 20px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .mic-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #00d4ff;
            border: none;
            cursor: pointer;
            font-size: 22px;
            color: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
            z-index: 100;
        }

        .mic-btn.listening {
            animation: pulse 1.5s infinite;
            background: #ff4444;
        }

        .speak-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #1a1a24;
            border: 1px solid #00d4ff;
            cursor: pointer;
            font-size: 22px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Menú lateral de historial */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #111118;
            border-right: 1px solid rgba(0, 212, 255, 0.2);
            z-index: 200;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: #00d4ff;
            font-size: 18px;
            font-weight: 500;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: #8899bb;
            font-size: 24px;
            cursor: pointer;
        }

        .categorias {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .categoria {
            margin-bottom: 20px;
        }

        .categoria-titulo {
            color: #00d4ff;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .categoria-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-historial {
            background: #1a1a24;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-historial:hover {
            background: #222230;
        }

        .item-pregunta {
            font-size: 13px;
            color: #e1e4e8;
            margin-bottom: 4px;
        }

        .item-respuesta {
            font-size: 11px;
            color: #8899bb;
        }

        .item-fecha {
            font-size: 9px;
            color: #00d4ff;
            margin-top: 6px;
        }

        .vaciar-btn {
            background: #ff444415;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
        }

        .chat-area::-webkit-scrollbar {
            width: 3px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: #1a1a24;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 3px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .image-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            cursor: pointer;
        }

        .image-preview img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="main">
        <div class="header">
            <div class="title">KIRO</div>
        </div>

        <div class="visualizer" id="visualizer"></div>

        <div class="controls">
            <button class="btn" id="modoTextoBtn">texto</button>
            <button class="btn" id="modoVozBtn">voz</button>
            <button class="btn" id="toggleVozBtn">🔊</button>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-area" id="inputArea">
            <input type="text" id="messageInput" placeholder="mensaje">
            <button class="btn" id="sendBtn" style="background:#00d4ff;color:#0a0a0f;">→</button>
        </div>
    </div>
</div>

<button class="menu-btn" id="menuBtn">☰</button>
<button class="mic-btn" id="micBtn">🎤</button>
<button class="speak-btn" id="speakBtn">🔊</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>📜 HISTORIAL</h3>
        <button class="close-sidebar" id="closeSidebar">×</button>
    </div>
    <div class="categorias" id="categoriasContainer">
        <!-- Categorías dinámicas -->
    </div>
</div>
<div class="overlay" id="overlay"></div>

<script>
    // ==================== CONFIGURACIÓN ====================
    let vozActiva = true;
    let modoTexto = true;
    let escuchando = false;
    let reconocimiento = null;
    let esperandoRespuesta = false;
    let ultimoMensajeAI = "";

    // Historial por categorías
    let categorias = {
        "💬 Conversación": [],
        "🎨 Imágenes": [],
        "🌐 Comandos": []
    };

    const STORAGE_KEY = "kiro_categorias";

    // Elementos
    const chatArea = document.getElementById('chatArea');
    const modoTextoBtn = document.getElementById('modoTextoBtn');
    const modoVozBtn = document.getElementById('modoVozBtn');
    const toggleVozBtn = document.getElementById('toggleVozBtn');
    const inputArea = document.getElementById('inputArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const speakBtn = document.getElementById('speakBtn');
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeSidebar = document.getElementById('closeSidebar');
    const categoriasContainer = document.getElementById('categoriasContainer');
    const visualizer = document.getElementById('visualizer');

    // Cargar historial guardado
    function cargarHistorial() {
        const guardado = localStorage.getItem(STORAGE_KEY);
        if (guardado) {
            categorias = JSON.parse(guardado);
        }
        renderizarHistorial();
    }

    // Guardar historial
    function guardarHistorial() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(categorias));
        renderizarHistorial();
    }

    // Renderizar menú de historial por categorías
    function renderizarHistorial() {
        categoriasContainer.innerHTML = '';
        
        for (const [nombre, items] of Object.entries(categorias)) {
            if (items.length === 0) continue;
            
            const categoriaDiv = document.createElement('div');
            categoriaDiv.className = 'categoria';
            
            const tituloDiv = document.createElement('div');
            tituloDiv.className = 'categoria-titulo';
            tituloDiv.innerHTML = `
                <span>${nombre}</span>
                <button class="vaciar-btn" data-categoria="${nombre}">vaciar</button>
            `;
            
            const itemsDiv = document.createElement('div');
            itemsDiv.className = 'categoria-items';
            
            // Mostrar últimos 5 items por categoría
            const itemsMostrar = items.slice(-5).reverse();
            itemsMostrar.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item-historial';
                itemDiv.onclick = () => cargarConversacion(item);
                itemDiv.innerHTML = `
                    <div class="item-pregunta">${item.pregunta.length > 40 ? item.pregunta.substring(0, 40) + '...' : item.pregunta}</div>
                    <div class="item-respuesta">${item.respuesta.length > 60 ? item.respuesta.substring(0, 60) + '...' : item.respuesta}</div>
                    <div class="item-fecha">${item.fecha}</div>
                `;
                itemsDiv.appendChild(itemDiv);
            });
            
            categoriaDiv.appendChild(tituloDiv);
            categoriaDiv.appendChild(itemsDiv);
            categoriasContainer.appendChild(categoriaDiv);
        }
        
        if (categorias["💬 Conversación"].length === 0 && categorias["🎨 Imágenes"].length === 0 && categorias["🌐 Comandos"].length === 0) {
            categoriasContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: #8899bb;">No hay historial aún</div>';
        }
        
        // Eventos para botones vaciar
        document.querySelectorAll('.vaciar-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const cat = btn.dataset.categoria;
                if (confirm(`¿Vaciar toda la categoría "${cat}"?`)) {
                    categorias[cat] = [];
                    guardarHistorial();
                    if (cat === "💬 Conversación") {
                        // Recargar chat también
                        document.getElementById('chatArea').innerHTML = '';
                    }
                }
            };
        });
    }

    // Agregar item al historial
    function agregarAlHistorial(pregunta, respuesta, tipo) {
        const fecha = new Date().toLocaleString();
        const item = {
            pregunta: pregunta,
            respuesta: respuesta,
            fecha: fecha,
            timestamp: Date.now()
        };
        
        if (tipo === 'imagen') {
            categorias["🎨 Imágenes"].push(item);
            if (categorias["🎨 Imágenes"].length > 30) categorias["🎨 Imágenes"].shift();
        } else if (tipo === 'comando') {
            categorias["🌐 Comandos"].push(item);
            if (categorias["🌐 Comandos"].length > 20) categorias["🌐 Comandos"].shift();
        } else {
            categorias["💬 Conversación"].push(item);
            if (categorias["💬 Conversación"].length > 30) categorias["💬 Conversación"].shift();
        }
        
        guardarHistorial();
    }

    // Cargar una conversación del historial
    function cargarConversacion(item) {
        // Limpiar chat actual
        chatArea.innerHTML = '';
        // Agregar la conversación al chat
        addMessageToChat('user', item.pregunta, false);
        addMessageToChat('ai', item.respuesta, false);
        cerrarMenu();
    }

    function abrirMenu() {
        sidebar.classList.add('open');
        overlay.classList.add('show');
        renderizarHistorial();
    }

    function cerrarMenu() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }

    // Visualizador
    function crearVisualizador() {
        visualizer.innerHTML = '';
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }
    }
    crearVisualizador();
    const bars = document.querySelectorAll('.bar');

    let animando = false;
    function animarVisualizador(intensidad = 0.5) {
        if (animando) return;
        animando = true;
        function animar() {
            if (!animando) return;
            bars.forEach((bar, i) => {
                const angle = (i / bars.length) * Math.PI * 2;
                const height = 4 + (intensidad * 30) * (0.5 + 0.5 * Math.sin(angle + Date.now() / 120));
                bar.style.height = `${Math.max(4, Math.min(35, height))}px`;
            });
            requestAnimationFrame(animar);
        }
        animar();
    }

    function detenerVisualizador() {
        animando = false;
        bars.forEach(bar => bar.style.height = '6px');
    }

    // Voz
    function hablar(texto) {
        if (!vozActiva || !texto) return;
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        animarVisualizador(0.6);
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.onend = () => detenerVisualizador();
        utterance.onerror = () => detenerVisualizador();
        window.speechSynthesis.speak(utterance);
    }

    function leerUltimo() {
        if (ultimoMensajeAI && vozActiva) hablar(ultimoMensajeAI);
    }

    // Imagen
    async function generarImagen(prompt) {
        let promptLimpio = prompt;
        const palabras = ["genera", "dibuja", "crea", "haz", "una imagen de", "un dibujo de", "imagen de", "dame"];
        for (const p of palabras) promptLimpio = promptLimpio.replace(p, "");
        promptLimpio = promptLimpio.trim();
        if (!promptLimpio) return { error: "¿Qué quieres que dibuje?" };
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptLimpio)}?width=512&height=512&nologo=true`;
        return { url, prompt: promptLimpio };
    }

    function mostrarImagenEnChat(url, prompt, guardar = true) {
        const div = document.createElement('div');
        div.className = 'message image';
        div.innerHTML = `<img src="${url}" alt="${prompt}" onclick="verImagen(this.src)">`;
        chatArea.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        if (guardar) {
            agregarAlHistorial(`🎨 ${prompt}`, "[Imagen generada]", 'imagen');
        }
        ultimoMensajeAI = `Imagen generada: ${prompt}`;
    }

    window.verImagen = (src) => {
        const overlay = document.createElement('div');
        overlay.className = 'image-preview';
        overlay.onclick = () => overlay.remove();
        const img = document.createElement('img');
        img.src = src;
        overlay.appendChild(img);
        document.body.appendChild(overlay);
    };

    // IA
    async function preguntarIA(mensaje) {
        try {
            const url = `https://text.pollinations.ai/${encodeURIComponent(mensaje)}`;
            const res = await fetch(url);
            if (res.ok) return await res.text();
            return null;
        } catch { return null; }
    }

    // Mensajes
    function addMessageToChat(sender, text, guardar = true) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.textContent = text;
        chatArea.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        if (sender === 'ai') {
            ultimoMensajeAI = text;
            if (vozActiva) setTimeout(() => hablar(text), 100);
        }
    }

    async function procesar(mensaje) {
        if (!mensaje.trim() || esperandoRespuesta) return;
        
        const lower = mensaje.toLowerCase();
        let esComando = false;
        
        if (lower.includes('abre youtube')) {
            window.open('https://youtube.com', '_blank');
            addMessageToChat('ai', 'Abriendo YouTube');
            agregarAlHistorial(mensaje, "Abriendo YouTube", 'comando');
            esComando = true;
            return;
        }
        if (lower.includes('abre google')) {
            window.open('https://google.com', '_blank');
            addMessageToChat('ai', 'Abriendo Google');
            agregarAlHistorial(mensaje, "Abriendo Google", 'comando');
            esComando = true;
            return;
        }
        
        const palabrasImg = ["genera", "dibuja", "crea", "haz", "imagen de", "dibujo de"];
        if (palabrasImg.some(p => lower.includes(p))) {
            const img = await generarImagen(mensaje);
            if (img.error) {
                addMessageToChat('ai', img.error);
                agregarAlHistorial(mensaje, img.error, 'imagen');
            } else {
                mostrarImagenEnChat(img.url, img.prompt);
            }
            esComando = true;
            return;
        }
        
        esperandoRespuesta = true;
        const thinking = document.createElement('div');
        thinking.className = 'message ai';
        thinking.textContent = '...';
        thinking.id = 'thinking';
        chatArea.appendChild(thinking);
        thinking.scrollIntoView({ behavior: 'smooth', block: 'end' });
        
        let respuesta = await preguntarIA(mensaje);
        if (!respuesta) respuesta = "No entendí. ¿Puedes repetir?";
        
        document.getElementById('thinking')?.remove();
        addMessageToChat('ai', respuesta);
        
        if (!esComando) {
            agregarAlHistorial(mensaje, respuesta, 'conversacion');
        }
        
        esperandoRespuesta = false;
    }

    async function enviar() {
        const msg = messageInput.value.trim();
        if (!msg) return;
        messageInput.value = '';
        addMessageToChat('user', msg);
        await procesar(msg);
    }

    // Voz
    function iniciarReconocimiento() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) return;
        const rec = new SpeechRec();
        rec.lang = 'es-ES';
        rec.onstart = () => {
            escuchando = true;
            micBtn.classList.add('listening');
            micBtn.innerHTML = '🎙️';
            animarVisualizador(0.5);
        };
        rec.onresult = async (e) => {
            const texto = e.results[0][0].transcript;
            addMessageToChat('user', texto);
            await procesar(texto);
        };
        rec.onerror = () => {};
        rec.onend = () => {
            escuchando = false;
            micBtn.classList.remove('listening');
            micBtn.innerHTML = '🎤';
            detenerVisualizador();
        };
        rec.start();
    }

    // Eventos
    modoTextoBtn.onclick = () => {
        modoTexto = true;
        inputArea.style.display = 'flex';
        modoTextoBtn.classList.add('btn-active');
        modoVozBtn.classList.remove('btn-active');
    };
    modoVozBtn.onclick = () => {
        modoTexto = false;
        inputArea.style.display = 'none';
        modoTextoBtn.classList.remove('btn-active');
        modoVozBtn.classList.add('btn-active');
    };
    toggleVozBtn.onclick = () => {
        vozActiva = !vozActiva;
        toggleVozBtn.style.background = vozActiva ? '#00d4ff' : '#1a1a24';
        toggleVozBtn.style.color = vozActiva ? '#0a0a0f' : '#8899bb';
    };
    sendBtn.onclick = enviar;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') enviar(); };
    micBtn.onclick = () => { if (!modoTexto && !escuchando) iniciarReconocimiento(); };
    speakBtn.onclick = leerUltimo;
    menuBtn.onclick = abrirMenu;
    closeSidebar.onclick = cerrarMenu;
    overlay.onclick = cerrarMenu;

    // Inicializar
    modoTextoBtn.classList.add('btn-active');
    toggleVozBtn.style.background = '#00d4ff';
    toggleVozBtn.style.color = '#0a0a0f';
    inputArea.style.display = 'flex';
    
    // Cargar historial guardado
    cargarHistorial();
</script>
</body>
</html>
