<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KIRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            width: 100%;
            position: fixed;
        }

        /* App container - flex column que ocupa todo */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Header con pestañas */
        .tabs-container {
            background: #0a0a0f;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15);
            flex-shrink: 0;
            width: 100%;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            padding: 6px 10px;
            gap: 6px;
            scrollbar-width: thin;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            background: #1a1a24;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px;
            border: 1px solid transparent;
            flex-shrink: 0;
        }

        .tab.active {
            background: #00d4ff;
        }

        .tab.active .tab-name {
            color: #0a0a0f;
            font-weight: 600;
        }

        .tab-name {
            font-size: 12px;
            color: #e1e4e8;
        }

        .tab-close {
            background: none;
            border: none;
            color: #8899bb;
            font-size: 14px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .new-tab-btn {
            background: #00d4ff;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Visualizador */
        .visualizer {
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
            padding: 2px 12px;
            margin: 4px 12px;
            background: rgba(0, 212, 255, 0.04);
            border-radius: 12px;
            flex-shrink: 0;
        }

        .bar {
            width: 2.5px;
            height: 5px;
            background: #00d4ff;
            border-radius: 1px;
            transition: height 0.05s ease;
        }

        /* Panel de chat - ocupa todo el espacio restante */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        /* Contenedor de mensajes - scrollable */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 85%;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.35;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #00d4ff15;
            border: 1px solid #00d4ff30;
            color: #00d4ff;
        }

        .message.ai {
            align-self: flex-start;
            background: #1a1a24;
            color: #e1e4e8;
        }

        .message.image {
            padding: 4px;
        }

        .message.image img {
            max-width: 130px;
            max-height: 130px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Input wrapper - siempre visible */
        .input-wrapper {
            background: #111118;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-wrapper input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 24px;
            background: #1a1a24;
            color: #e1e4e8;
            font-size: 14px;
            outline: none;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mic-action {
            background: #00d4ff;
            color: #0a0a0f;
        }

        .mic-action.listening {
            animation: pulse 1.5s infinite;
            background: #ff4444;
        }

        .speak-action {
            background: #1a1a24;
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }

        .send-action {
            background: #00d4ff;
            color: #0a0a0f;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Menú lateral */
        .sidebar {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: #111118;
            border-right: 1px solid rgba(0, 212, 255, 0.2);
            z-index: 200;
            transition: left 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: #00d4ff;
            font-size: 16px;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: #8899bb;
            font-size: 22px;
            cursor: pointer;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            background: #1a1a24;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .chat-item.active {
            border-left: 3px solid #00d4ff;
        }

        .chat-title {
            font-size: 13px;
            color: #e1e4e8;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .chat-preview {
            font-size: 11px;
            color: #8899bb;
        }

        .chat-date {
            font-size: 9px;
            color: #00d4ff;
            margin-top: 5px;
        }

        .delete-chat {
            background: none;
            border: none;
            color: #ff4444;
            font-size: 13px;
            cursor: pointer;
            margin-top: 5px;
            text-align: right;
        }

        .menu-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #1a1a24;
            border: 1px solid #00d4ff;
            cursor: pointer;
            font-size: 18px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .image-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            cursor: pointer;
        }

        .image-preview img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        .chat-container::-webkit-scrollbar {
            width: 3px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: #1a1a24;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 3px;
        }

        .tabs::-webkit-scrollbar {
            height: 2px;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="tabs-container">
        <div class="tabs" id="tabsContainer"></div>
    </div>

    <div class="visualizer" id="visualizer"></div>

    <div class="chat-panel">
        <div class="chat-container" id="chatContainer"></div>

        <div class="input-wrapper">
            <button class="action-btn mic-action" id="micBtn">🎤</button>
            <input type="text" id="messageInput" placeholder="mensaje">
            <button class="action-btn send-action" id="sendBtn">→</button>
            <button class="action-btn speak-action" id="speakBtn">🔊</button>
        </div>
    </div>
</div>

<button class="menu-btn" id="menuBtn">☰</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>📜 CHATS</h3>
        <button class="close-sidebar" id="closeSidebar">×</button>
    </div>
    <div class="chats-list" id="chatsList"></div>
</div>
<div class="overlay" id="overlay"></div>

<script>
    // ==================== CONFIGURACIÓN ====================
    let vozActiva = true;
    let escuchando = false;
    let reconocimiento = null;
    let esperandoRespuesta = false;
    let chatActualId = null;

    let chats = [];
    let nextId = 1;
    const STORAGE_KEY = "kiro_chats";

    const tabsContainer = document.getElementById('tabsContainer');
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const micBtn = document.getElementById('micBtn');
    const sendBtn = document.getElementById('sendBtn');
    const speakBtn = document.getElementById('speakBtn');
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const closeSidebar = document.getElementById('closeSidebar');
    const chatsList = document.getElementById('chatsList');
    const visualizer = document.getElementById('visualizer');

    // Visualizador
    function crearVisualizador() {
        visualizer.innerHTML = '';
        for (let i = 0; i < 18; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }
    }
    crearVisualizador();
    const bars = document.querySelectorAll('.bar');

    let animando = false;
    function animarVisualizador(intensidad = 0.5) {
        if (animando) return;
        animando = true;
        function animar() {
            if (!animando) return;
            bars.forEach((bar, i) => {
                const angle = (i / bars.length) * Math.PI * 2;
                const height = 3 + (intensidad * 25) * (0.5 + 0.5 * Math.sin(angle + Date.now() / 120));
                bar.style.height = `${Math.max(3, Math.min(28, height))}px`;
            });
            requestAnimationFrame(animar);
        }
        animar();
    }

    function detenerVisualizador() {
        animando = false;
        bars.forEach(bar => bar.style.height = '5px');
    }

    function hablar(texto) {
        if (!vozActiva || !texto) return;
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        animarVisualizador(0.6);
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.onend = () => detenerVisualizador();
        utterance.onerror = () => detenerVisualizador();
        window.speechSynthesis.speak(utterance);
    }

    // Gestión de chats
    function guardarChats() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
        renderizarTabs();
        renderizarListaChats();
    }

    function crearNuevoChat() {
        const nuevoChat = {
            id: nextId++,
            nombre: `Chat ${nextId - 1}`,
            fecha: new Date().toLocaleString(),
            mensajes: [],
            ultimoMensaje: ""
        };
        chats.unshift(nuevoChat);
        guardarChats();
        setChatActual(nuevoChat.id);
        return nuevoChat;
    }

    function setChatActual(id) {
        chatActualId = id;
        const chat = chats.find(c => c.id === id);
        if (chat) renderizarMensajes(chat);
        renderizarTabs();
        renderizarListaChats();
    }

    function eliminarChat(id) {
        if (chats.length === 1) {
            alert("No puedes eliminar el último chat. Crea uno nuevo.");
            return;
        }
        chats = chats.filter(c => c.id !== id);
        if (chatActualId === id) setChatActual(chats[0].id);
        guardarChats();
    }

    function agregarMensajeAlChat(chatId, texto, esUsuario, esImagen = false, imagenUrl = null) {
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        const mensaje = {
            id: Date.now(),
            texto: texto,
            esUsuario: esUsuario,
            timestamp: new Date().toLocaleTimeString(),
            esImagen: esImagen,
            imagenUrl: imagenUrl
        };
        chat.mensajes.push(mensaje);
        chat.ultimoMensaje = texto.substring(0, 50);
        chat.fecha = new Date().toLocaleString();
        guardarChats();
        if (chatId === chatActualId) renderizarMensajes(chat);
        return mensaje;
    }

    function renderizarMensajes(chat) {
        if (!chatContainer) return;
        chatContainer.innerHTML = '';
        if (!chat.mensajes) return;
        chat.mensajes.forEach(msg => {
            if (msg.esImagen && msg.imagenUrl) {
                const div = document.createElement('div');
                div.className = 'message image';
                div.innerHTML = `<img src="${msg.imagenUrl}" alt="${msg.texto}" onclick="verImagen(this.src)">`;
                chatContainer.appendChild(div);
            } else {
                const div = document.createElement('div');
                div.className = `message ${msg.esUsuario ? 'user' : 'ai'}`;
                div.textContent = msg.texto;
                chatContainer.appendChild(div);
            }
        });
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function renderizarTabs() {
        if (!tabsContainer) return;
        tabsContainer.innerHTML = '';
        chats.forEach(chat => {
            const tab = document.createElement('div');
            tab.className = `tab ${chatActualId === chat.id ? 'active' : ''}`;
            tab.innerHTML = `<span class="tab-name">${chat.nombre}</span><button class="tab-close" data-id="${chat.id}">×</button>`;
            tab.onclick = (e) => {
                if (e.target.classList.contains('tab-close')) return;
                setChatActual(chat.id);
            };
            const closeBtn = tab.querySelector('.tab-close');
            closeBtn.onclick = (e) => {
                e.stopPropagation();
                eliminarChat(chat.id);
            };
            tabsContainer.appendChild(tab);
        });
        const newBtn = document.createElement('button');
        newBtn.className = 'new-tab-btn';
        newBtn.innerHTML = '+';
        newBtn.onclick = () => crearNuevoChat();
        tabsContainer.appendChild(newBtn);
    }

    function renderizarListaChats() {
        if (!chatsList) return;
        chatsList.innerHTML = '';
        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = `chat-item ${chatActualId === chat.id ? 'active' : ''}`;
            item.innerHTML = `
                <div class="chat-title">${chat.nombre}</div>
                <div class="chat-preview">${chat.ultimoMensaje || 'Nuevo chat'}</div>
                <div class="chat-date">${chat.fecha}</div>
                <button class="delete-chat" data-id="${chat.id}">🗑️ Eliminar</button>
            `;
            item.onclick = (e) => {
                if (e.target.classList.contains('delete-chat')) return;
                setChatActual(chat.id);
                cerrarMenu();
            };
            const delBtn = item.querySelector('.delete-chat');
            delBtn.onclick = (e) => {
                e.stopPropagation();
                eliminarChat(chat.id);
            };
            chatsList.appendChild(item);
        });
    }

    // IA y comandos
    async function generarImagen(prompt) {
        let limpio = prompt;
        const palabras = ["genera", "dibuja", "crea", "haz", "una imagen de", "un dibujo de", "imagen de", "dame"];
        for (const p of palabras) limpio = limpio.replace(p, "");
        limpio = limpio.trim();
        if (!limpio) return { error: "¿Qué quieres dibujar?" };
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(limpio)}?width=512&height=512&nologo=true`;
        return { url, prompt: limpio };
    }

    async function preguntarIA(mensaje) {
        try {
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(mensaje)}`);
            if (res.ok) return await res.text();
            return null;
        } catch { return null; }
    }

    async function procesarMensaje(texto) {
        if (!texto.trim() || esperandoRespuesta) return;
        const lower = texto.toLowerCase();
        if (lower.includes('abre youtube')) {
            window.open('https://youtube.com', '_blank');
            agregarMensajeAlChat(chatActualId, "Abriendo YouTube", false);
            return;
        }
        if (lower.includes('abre google')) {
            window.open('https://google.com', '_blank');
            agregarMensajeAlChat(chatActualId, "Abriendo Google", false);
            return;
        }
        const imgPalabras = ["genera", "dibuja", "crea", "haz", "imagen de", "dibujo de"];
        if (imgPalabras.some(p => lower.includes(p))) {
            const img = await generarImagen(texto);
            if (img.error) agregarMensajeAlChat(chatActualId, img.error, false);
            else agregarMensajeAlChat(chatActualId, img.prompt, false, true, img.url);
            return;
        }
        esperandoRespuesta = true;
        const thinkingId = Date.now();
        const chat = chats.find(c => c.id === chatActualId);
        if (chat) {
            chat.mensajes.push({ id: thinkingId, texto: "...", esUsuario: false, esImagen: false });
            renderizarMensajes(chat);
        }
        let respuesta = await preguntarIA(texto);
        if (!respuesta) respuesta = "No entendí. ¿Puedes repetir?";
        if (chat) {
            chat.mensajes = chat.mensajes.filter(m => m.id !== thinkingId);
            agregarMensajeAlChat(chatActualId, respuesta, false);
        }
        esperandoRespuesta = false;
    }

    async function enviarMensaje() {
        const texto = messageInput.value.trim();
        if (!texto) return;
        messageInput.value = '';
        agregarMensajeAlChat(chatActualId, texto, true);
        await procesarMensaje(texto);
    }

    function iniciarReconocimiento() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) return;
        const rec = new SpeechRec();
        rec.lang = 'es-ES';
        rec.onstart = () => {
            escuchando = true;
            micBtn.classList.add('listening');
            micBtn.innerHTML = '🎙️';
            animarVisualizador(0.5);
        };
        rec.onresult = async (e) => {
            const texto = e.results[0][0].transcript;
            agregarMensajeAlChat(chatActualId, texto, true);
            await procesarMensaje(texto);
        };
        rec.onerror = () => {};
        rec.onend = () => {
            escuchando = false;
            micBtn.classList.remove('listening');
            micBtn.innerHTML = '🎤';
            detenerVisualizador();
        };
        rec.start();
    }

    function leerUltimoMensaje() {
        const chat = chats.find(c => c.id === chatActualId);
        if (chat && chat.mensajes.length) {
            const ultimo = chat.mensajes.filter(m => !m.esUsuario && !m.esImagen).pop();
            if (ultimo && vozActiva) hablar(ultimo.texto);
        }
    }

    window.verImagen = (src) => {
        const div = document.createElement('div');
        div.className = 'image-preview';
        div.onclick = () => div.remove();
        const img = document.createElement('img');
        img.src = src;
        div.appendChild(img);
        document.body.appendChild(div);
    };

    // Menú
    function abrirMenu() { sidebar.classList.add('open'); overlay.classList.add('show'); renderizarListaChats(); }
    function cerrarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }

    // Eventos
    if (sendBtn) sendBtn.onclick = enviarMensaje;
    if (messageInput) messageInput.onkeypress = (e) => { if (e.key === 'Enter') enviarMensaje(); };
    if (micBtn) micBtn.onclick = () => { if (!escuchando) iniciarReconocimiento(); };
    if (speakBtn) speakBtn.onclick = leerUltimoMensaje;
    if (menuBtn) menuBtn.onclick = abrirMenu;
    if (closeSidebar) closeSidebar.onclick = cerrarMenu;
    if (overlay) overlay.onclick = cerrarMenu;

    // Inicializar
    function init() {
        const guardado = localStorage.getItem(STORAGE_KEY);
        if (guardado) {
            chats = JSON.parse(guardado);
            nextId = Math.max(...chats.map(c => c.id), 0) + 1;
        }
        if (!chats.length) {
            chats.push({ id: nextId++, nombre: "Chat 1", fecha: new Date().toLocaleString(), mensajes: [], ultimoMensaje: "" });
            guardarChats();
        }
        setChatActual(chats[0].id);
    }
    init();
</script>
</body>
</html>
